id: zero-budget
name: Zero Budget Agent
version: "1.0.0"
role: Test role
scope: Test scope
parent: cos
objective: Test unlimited budget
wake:
  triggers:
    - timer.tick.6h
  responsibilities:
    - name: health-check
      interval: 1800
      description: Run health checks
authority:
  green:
    - Read files
  yellow: []
  red: []
budget:
  wakes_per_hour: 6
  usd_per_day: 0
  usd_per_shift: 0
memory:
  max_size_kb: 64
hooks:
  on_find: null
  on_decide: null
  on_act: null
  on_verify: null
escalation_channel: "#test"
kill_switch: /tmp/.hex-zero-budget-HALT
